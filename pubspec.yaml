name: alpaca_mobile
description: "ALPACA - Digitalisasi UMKM Agraris & Wisata Kuliner Lokal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.1
  firebase_database: ^11.3.1
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network & Connectivity
  connectivity_plus: ^6.1.1

  # Local Storage
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.1

  # Media
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
